; =============================================================================
; PicoGUS Joystick Configuration File
; =============================================================================
;
;   pgusinit /joyini joy.ini        - apply for this session only
;   pgusinit /joyini joy.ini /save  - apply and save to flash
;   pgusinit /joylayout snes        - switch button layout quickly
;   pgusinit /joyprofile gamepad    - switch axis profile quickly
;   pgusinit /joywizard p1          - interactive button mapping wizard
;   pgusinit /joystatus             - print current config from card
;
; =============================================================================

[joystick]

; -----------------------------------------------------------------------------
; profile — axis routing only, does not affect button mapping
;
;   gamepad        joy1 = left stick, joy2 = right stick (default)
;   throttle       joy2_y = throttle (Slider), joy2_x = rudder (Rz)
;   ch_flightstick CH FlightStick Pro protocol (6-button + hat encoding)
;   fcs            Thrustmaster FCS (hat encoded as analog on joy2_y)
;
profile=gamepad

; joy1_deadzone / joy2_deadzone — center dead zone 0-127, 0=off
;   Single-player: joy1=main stick, joy2=right stick or throttle
;   Dual-player:   joy1=player 1 stick, joy2=player 2 stick
;
joy1_deadzone=0
joy2_deadzone=0

; swap_throttle_rudder — swap joy2_x/joy2_y in throttle profile (0 or 1)
swap_throttle_rudder=0

; -----------------------------------------------------------------------------
; joy1_btn_layout / joy2_btn_layout
;
; Selects a built-in button table for the controller type connected.
; Ignored automatically if you specify btn1-4 below.
;
;   gamepad   Standard USB gamepad (Xbox / PlayStation / modern generic)
;             DOS btn1=South  btn2=East  btn3=West  btn4=North
;
;   snes      SNES USB adapter
;             DOS btn1=B  btn2=A  btn3=Y  btn4=X
;
joy1_btn_layout=gamepad
joy2_btn_layout=gamepad

; -----------------------------------------------------------------------------
; Custom button mapping — btn1 through btn4
;
; When any of these are set they override the layout table above entirely.
; Use whichever naming convention matches your controller.
; Raw numeric HID index is also accepted (e.g. btn1=7).
;
; Generic / positional:
;   south  east  west  north  lb  rb  lt  rt  select  start  l3  r3
;
; Xbox / generic USB gamepad:
;   xbox_a  xbox_b  xbox_x  xbox_y
;   xbox_lb  xbox_rb  xbox_lt  xbox_rt
;   xbox_back  xbox_start  xbox_l3  xbox_r3
;
; PlayStation:
;   ps_cross  ps_circle  ps_square  ps_triangle
;   ps_l1  ps_r1  ps_l2  ps_r2
;   ps_share  ps_options  ps_l3  ps_r3
;
; SNES USB adapter:
;   snes_b  snes_y  snes_select  snes_start
;   snes_a  snes_x  snes_l  snes_r
;
; Default mapping (standard gamepad, Gravis-compatible):
btn1=south
btn2=east
btn3=west
btn4=north

; -----------------------------------------------------------------------------
; Axis inversion — 0=normal, 1=inverted
invert_joy1_y=0
invert_joy2_y=0


; =============================================================================
; Example configurations
; =============================================================================
;
; --- Standard gamepad (default) ---
; profile=gamepad
; btn1=south
; btn2=east
; btn3=west
; btn4=north
;
; --- SNES adapter via layout shortcut ---
; joy1_btn_layout=snes
;
; --- SNES adapter via explicit mapping (same result) ---
; btn1=snes_b
; btn2=snes_a
; btn3=snes_y
; btn4=snes_x
;
; --- Xbox controller, face buttons ---
; btn1=xbox_a
; btn2=xbox_b
; btn3=xbox_x
; btn4=xbox_y
;
; --- Xbox controller, triggers as btn3/4 ---
; btn1=xbox_a
; btn2=xbox_b
; btn3=xbox_lt
; btn4=xbox_rt
;
; --- PlayStation controller ---
; btn1=ps_cross
; btn2=ps_circle
; btn3=ps_square
; btn4=ps_triangle
;
; --- PlayStation, shoulder buttons as btn3/4 ---
; btn1=ps_cross
; btn2=ps_circle
; btn3=ps_l1
; btn4=ps_r1
;
; --- Wing Commander / CH FlightStick Pro ---
; profile=ch_flightstick
; joy1_deadzone=8
;
; --- Descent / Thrustmaster FCS ---
; profile=fcs
; joy1_deadzone=5
;
; --- HOTAS (Saitek X45 etc.) ---
; profile=throttle
; joy1_deadzone=8
; joy2_deadzone=5
;
; --- Two players: gamepad (P1) + SNES adapter (P2) ---
; joy1_btn_layout=gamepad
; joy2_btn_layout=snes
